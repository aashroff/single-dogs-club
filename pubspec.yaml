name: single_dogs_club
description: The Single Dogs' Club - Find canine friends near you.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0

  # Maps & Location
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Networking & Data
  dio: ^5.4.3+1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase (Auth, Firestore, Storage, Messaging)
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  firebase_messaging: ^14.9.4

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Chat
  flutter_chat_types: ^3.6.2
  flutter_chat_ui: ^1.6.14

  # Swipe cards
  flutter_card_swiper: ^7.0.1

  # Icons
  flutter_lucide: ^1.1.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
